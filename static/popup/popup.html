<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ScreenSense Zoom</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="popup">
      <div class="chrome-frame"></div>
      <section class="hero">
        <p class="eyebrow">Window Ledger</p>
        <h1>ScreenSense Zoom</h1>
        <p class="intro">
          Tracked available screen dimensions from live Chrome window movement.
        </p>
      </section>
      <section class="panel">
        <div class="panel-header">
          <p class="panel-label">Observed resolutions</p>
          <span class="panel-accent">Live</span>
        </div>
        <div id="app"></div>
      </section>
    </main>
    <script type="module" src="./popup.js"></script>
  </body>
</html>
